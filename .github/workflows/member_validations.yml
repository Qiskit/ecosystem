name: Member validations

on:
  workflow_dispatch:
  pull_request:
    types: [ ready_for_review, edited]
    paths:
      - '**.toml'
jobs:
  validate_candidate:
    name: Validate unmerged candidate
    if: >
      ${{ github.event.pull_request.draft == false 
      && contains(github.event.pull_request.head.ref, 'submission')
      && contains(github.event.pull_request.labels.*.name, 'submission') }}
    runs-on: ubuntu-latest
    env:
      python-version: "3.13"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: actions/checkout@v6
      - name: Checkout PR
        run: |
          gh pr checkout ${{ github.event.pull_request.number }}
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch member id
        id: get-id
        run: |
          id=$(echo ${{ github.event.pull_request.head.ref }} | cut -d- -f2 )
          echo "::set-output name=id::$id"
      - name: Initial validatation
        run: python manager.py ci validate_member ${{ steps.get-id.outputs.id }}
      - name: Create sections
        run: python manager.py ci create_sections ${{ steps.get-id.outputs.id }}
      - name: Section validatation
        run: python manager.py ci validate_member ${{ steps.get-id.outputs.id }}
      - name: Commit sections
        if: success()
        run: git commit -am "Update sections on unmerged submission" --allow-empty
      - name: Fetch data
        run: python manager.py ci fetch_new_member_data ${{ steps.get-id.outputs.id }}
      - name: Data validatation
        run: python manager.py ci validate_member ${{ steps.get-id.outputs.id }}
      - name: Commit data
        if: success()
        run: git commit -am "Update data on unmerged submission" --allow-empty
      - name: Push sections
        if: always()
        run: git push --verbose
