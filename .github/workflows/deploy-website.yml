name: Deploy Website
# Builds website/ and deploys its content to  https://qiskit.github.io/ecosystem/

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_site:
      name: Build Website
      concurrency: ci-${{ github.ref }}
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6
        - name: Set up Python 3.13
          uses: actions/setup-python@v6
          with:
            python-version: '3.13'
        - name: Install tox
          run: python -m pip install -U tox
        - name: Build website
          env:
            BITLY_TOKEN: ${{ secrets.BITLY_TOKEN }}
          run: tox -e website
        - name: Upload Artifacts
          uses: actions/upload-pages-artifact@v4
          with:
            path: 'website/'
  deploy:
    needs: build_site
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
