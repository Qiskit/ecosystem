site_name: Qiskit Ecosystem documentation
site_url: https://qiskit.github.io/ecosystem/
repo_url: https://github.com/Qiskit/ecosystem
repo_name: GitHub Repository

theme:
  name: material
  palette:
    primary: deep purple
  logo: img/logo.png
  favicon: img/favicon.ico
  icon:
    annotation: material/eye-circle
  features:
    - content.tooltips
    - content.code.copy
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.integrate

extra_javascript:
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - abbr
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - table-reader
  - gen-files:
      scripts:
        - ecosystem/generate_project_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - charts

nav:
  - Overview: overview.md
  - Projects:
    - Summary: summary.md
    - All: p/
#    - in GitHub: p/
#    - in PyPI: p/
  - Classifications:
    - Status: status.md
    - Categories: categories.md
    - Labels: labels.md
    - Qiskit Pattern steps: pattern_steps.md
    - Interfaces: interfaces.md
    - Maturity levels: maturity.md
  - Badges: badges.md
