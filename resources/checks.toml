#:schema ./checks-schema.json
[000]
title = "Build on, interface with, or extend the Qiskit in a meaningful way"
description = "Software in the Qiskit Ecosystem should related to Qiskit projects in some meaningful way. Software that manipulate Qiskit data structure (such as transpiler plugins) are good examples of that. If the connection with Qiskit is not that obvious, consider having a tutorial or how-to guide explaining a use-case for Qiskit users."
applies_to = "all"
category = "SUBMISSION"
importance = "CRITICAL"

[001]
title = "Have an OSI-approved license"
applies_to = "all"
affects = ['member.license', 'member.github.license', 'member.pypi.*.license']
category = "OSS"
description = "Projects in the Qiskit Ecosystem (and their packages) must have an OSI-approved license."
checker = "test_general.py::test_001"
importance = "CRITICAL"

[G00]
title = "Have a clear support expectation and, if actively maintained, show signs of that activity."
applies_to = "all"
category = "GENERAL"
related_to = ["G05"]
description = "Actively maintained projects should show signs of that. This includes recent activity in the code repository (such as commits, issue responses, or pull requests) as well as reasonably up-to-date package releases. Projects with no observable activity over an extended period may be considered abandoned."
importance = "CRITICAL"
checker = "test_general.py::test_G00"

[COC]
title = "Adhere to the Qiskit CoC"
applies_to = "all"
category = "SUBMISSION"
description = "Project submitters should adhere to the Qiskit code of conduct. If the submitter is the project maintainer, they can enforce your their code of conduct in addition to the one coming from Qiskit."
importance = "CRITICAL"

[Q20]
title = "Be compatible with the Qiskit SDK v2 or newer"
applies_to = "all"
category = "GENERAL"
related_to = ["PQ2"]
description = "If the software depends on Qiskit SDK in some way, there should exist a supported released that is compatible with the Qiskit SDK v2.0 or newer. This applies to Python packages and to other forms of dependencies."
importance = "CRITICAL"
checker = "test_general.py::test_Q20"

[004]
title = "Maturity property has to exist and be valid"
description = "`member.maturity` should exist in https://qisk.it/ecosystem-categories"
applies_to = "all"
affects = ["member.maturity"]
category = "SUBMISSION"
checker = "test_classifications.py::test_004"
importance = "IMPORTANT"

[005]
title = "Qiskit Pattern steps, if there, should be valid"
description = "All `member.pattern_steps` should exist in https://qisk.it/ecosystem-pattern_steps"
applies_to = "all"
affects = ["member.pattern_steps.*"]
category = "SUBMISSION"
checker = "test_classifications.py::test_005"
importance = "IMPORTANT"

[007]
title = "Interface have to exist"
description = "All `member.interfaces` should exist in https://qisk.it/ecosystem-interfaces"
applies_to = "all"
affects = ["member.interfaces.*"]
category = "SUBMISSION"
checker = "test_classifications.py::test_valid_interfaces"
importance = "IMPORTANT"

[008]
title = "Category have to exist"
description = "`member.category` should exist in https://qisk.it/ecosystem-categories"
applies_to = "all"
affects = ["member.category"]
category = "SUBMISSION"
checker = "test_classifications.py::test_valid_category"
importance = "IMPORTANT"

[009]
title = "Labels have to exist"
description = "All `member.labels` should exist in https://qisk.it/ecosystem-labels"
applies_to = "all"
affects = ["member.labels.*"]
category = "SUBMISSION"
checker = "test_classifications.py::test_valid_label"
importance = "IMPORTANT"

[010]
title = "member.name should not include the substring 'test'"
description = "Projects in the Qiskit Ecosystem should related"
applies_to = "all"
affects = ["member.name"]
category = "SUBMISSION"
checker = "test_name.py::test_valid_name_no_test_substring"
importance = "RECOMMENDATION"

[011]
title = "Do not repeat URLs in the submission"
description = "Having the same URL for, for example member.website and member.documentation is unnecessary. Keep better fit and remove the other one."
applies_to = "all"
affects = [
  "member.website",
  "member.url",
  "member.documentation",
  "member.packages.*",
]
category = "SUBMISSION"
importance = "STRONG-RECOMMENDATION"

[012]
title = "URLs must exists"
description = "None of the URLs must not return 404s or other forms of permanent errors. Rediractions are accepted."
applies_to = "all"
affects = [
  "member.website",
  "member.url",
  "member.documentation",
  "member.packages.*",
  "member.pypi.*.url",
]
category = "SUBMISSION"
importance = "IMPORTANT"

[013]
title = "URLs use a secure schema"
description = "All the URLs must use HTTTPS (HyperText Transfer Protocol Secure) schema."
applies_to = "all"
affects = [
  "member.website",
  "member.url",
  "member.documentation",
  "member.packages.*",
  "member.pypi.*.url",
]
checker = "test_url.py::TestURLs::test_http"
category = "SUBMISSION"
importance = "IMPORTANT"

[014]
title = "Description too long"
description = "Member description cannot be longer than 135 characters because front-end design limitations."
applies_to = "all"
affects = ["member.description"]
checker = "test_description.py::test_description_len_135"
category = "SUBMISSION"
importance = "IMPORTANT"

[025]
title = "Documentation link has redundant suffix"
description = "Links like https://qiskit-banana-compiler.readthedocs.io/en/latest/ do not need the /en/latest suffix."
applies_to = "all"
affects = ["member.documentation"]
checker = "test_url.py::TestURLs::test_025"
category = "SUBMISSION"
importance = "RECOMMENDATION"

[026]
title = "The /README.md file is not documentation"
description = "It is fine to leave the `member.documentation` field empty. Pointing to the README.md file is not necessary."
applies_to = "all"
affects = ["member.documentation"]
checker = "test_url.py::TestURLs::test_026"
category = "SUBMISSION"
importance = "RECOMMENDATION"

[G05]
title = "Archived GitHub repository should have `unmaintaned` support"
applies_to = "GitHub projects"
affects = ['github.archived']
category = "ACTIVITY"
description = "Projects on an archived GitHub repository should have `unmaintaned` support (or `as-is`)."
importance = "CRITICAL"
checker = "test_github.py::test_G05"

[G06]
title = "Have maintainer activity within the last 6 months"
applies_to = "GitHub projects"
affects = ['member.github.last_activity']
category = "ACTIVITY"
description = "Projects available on GitHub should have some activity within the last 6 months, such as somebody staring the repository. This check does not apply to project that declared their support as as-is."
importance = "RECOMMENDATION"
checker = "test_github.py::test_G06"

[G07]
title = "Have a commit within the last 18 months"
applies_to = "GitHub projects"
affects = ['member.github.last_commit']
category = "ACTIVITY"
description = "Projects available on GitHub should have a commit activity activity within the last 18 months. This check does not apply to project that declared their support as as-is."
importance = "STRONG-RECOMMENDATION"
checker = "test_github.py::test_G07"

[G08]
title = "Unmaintained projects should be archived in GitHub repository"
applies_to = "GitHub projects"
affects = ['github.archived']
category = "ACTIVITY"
description = "Projects that are not maintained (ie. `member.support == unmaintaned`) should archived their GitHub repositories to signal other users and developers that issues or PRs are not going to be addressed."
importance = "RECOMMENDATION"
checker = "test_github.py::test_G08"

[G09]
title = "GitHub is not detecting the repository license"
applies_to = "GitHub projects"
affects = ['github.license']
category = "OSS"
description = "GitHub cannot detect the repository license"
importance = "RECOMMENDATION"
checker = "test_github.py::test_G09"

[G10]
title = "The reposity license is not (probably) OSI-approved"
applies_to = "GitHub projects"
affects = ['github.license']
category = "OSS"
description = "..."
importance = "IMPORTANT"
checker = "test_github.py::test_G10"

[G11]
title = "Unmaintaned projects should be archived when the repository is on an IBM-controlled organization"
applies_to = "GitHub projects"
affects = ['github.archived']
category = "ACTIVITY"
description = "..."
importance = "STRONG-RECOMMENDATION"
checker = "test_github.py::test_G11"

[O01]
title = "Have a license"
applies_to = "all"
affects = ['member.license']
category = "OSS"
description = "Projects must have a license, somewhere."
checker = "test_license.py::test_O01"
importance = "CRITICAL"

[I00]
title = "IBM-maintained project not in an IBM-controlled GitHub organization"
applies_to = "IBM-maintained projects"
affects = ['member.github.owner', 'member.ibm_maintained']
category = "OSS"
description = "Projects that are maintained by IBM should live in a GitHub organization that is controlled by IBM. This allows to, for example, archive projects once they are not longer maintained."
importance = "CRITICAL"
checker = "test_ibm_maintained.py::test_I00"

[PQ1]
title = "Be installable with qiskit>=1.0"
applies_to = "Python packages"
affects = ['member.pypi.*.compatible_with_qiskit_v1']
checker = "test_pypi.py::test_PQ1"
category = "OUT-OF-DATE"
description = "Python packages that depend on Qiskit SDK, there should exist a supported released that is compatible with the Qiskit SDK v1.0 or newer."
discussion = "https://github.com/Qiskit/ecosystem/issues/1144"
importance = "LEGACY"

[PQ2]
title = "Be installable with qiskit>=2.0"
applies_to = "Python packages"
affects = ['member.pypi.*.compatible_with_qiskit_v2']
checker = "test_pypi.py::test_PQ2"
category = "OUT-OF-DATE"
description = "Python packages that depend on Qiskit SDK, there should exist a supported released that is compatible with the Qiskit SDK v2.0 or newer."
importance = "IMPORTANT"

[P00]
title = "Python package license-related metadata should refer to a OSI-approved license"
applies_to = "Python packages"
affects = ['member.pypi.*.license']
category = "OSS"
description = "The license-related metadata in PyPA should be an OSI-approved open-source license."
importance = "CRITICAL"

[P10]
title = "Have a cap on the major version for the qiskit dependency"
applies_to = "Python packages"
affects = ['member.pypi.*.requires_qiskit']
category = "BEST-PRACTICE"
description = "As Qiskit follows semantic versioning, not having a cap for the eventual next major version, there is no guarantee that the package will continue working as expected after a major release."
checker = "test_pypi.py::test_P10"
cure_period_in_days = false                                                                                                                                                                                  # affects too many packages
importance = "RECOMMENDATION"

[P11]
title = "Production-ready projects should have, at least, one stable Python package"
applies_to = "Python packages"
affects = ['member.pypi.*.development_status', 'member.maturity']
category = "OUT-OF-DATE"
description = "If the project maturiy level is is production-ready then, at least one of the Python packages should have a Development Status classifier that is `None`, `Production/Stable`, or `Mature`."
checker = "test_pypi.py::test_P11"
importance = "STRONG-RECOMMENDATION"

[P12]
title = "PyPI package without license"
applies_to = "Python packages"
affects = ['member.pypi.*.license']
category = "OSS"
description = "..."
importance = "RECOMMENDATION"
checker = "test_pypi.py::test_P12"

[P13]
title = "The license declared in PyPI is (probably) not OSI-approved "
applies_to = "Python packages"
affects = ['member.pypi.*.license']
category = "OSS"
description = "..."
checker = "test_pypi.py::test_P13"
importance = "IMPORTANT"

[J00]
title = "Julia package without license"
applies_to = "Julia packages"
affects = ['member.julia.*.license']
category = "OSS"
description = "..."
importance = "RECOMMENDATION"
checker = "test_julia.py::test_J00"

[J01]
title = "The license declared in Julia is (probably) not OSI-approved "
applies_to = "Julia packages"
affects = ['member.julia.*.license']
category = "OSS"
description = "..."
checker = "test_julia.py::test_J01"
importance = "IMPORTANT"

[O02]
title = "member.license is not OSI-approved license"
applies_to = "all"
affects = ['member.license']
category = "SUBMISSION"
description = "member.license could not be found amount the OSI-approved licenses."
checker = "test_license.py::test_O02"
importance = "IMPORTANT"

[020]
title = "Primitive interface should be v2-compatible"
applies_to = 'label:"Compute provider"'
category = "OUT-OF-DATE"
description = "If the project implements a Qiskit primitive interface, it should be compatible with the V2 primitives API."
importance = "CRITICAL"

[[importance]]
name = "CRITICAL"
description = "This is a must-pass and there is no room for negotiation. Failing this test results in immediate removal."
cure_period_in_days = 0
icon = "material-close-outline"

[[importance]]
name = "IMPORTANT"
description = "If this check is on a candidate, the merge wont happen until the check passes. If affects an existing member, there will be a cure period for fixing it."
cure_period_in_days = 90
icon = "material-alert-octagram-outline"

[[importance]]
name = "STRONG-RECOMMENDATION"
description = "This is a strong-recommendation that can be waved if there is a really really good reason for it."
cure_period_in_days = 90
icon = "material-alert-rhombus-outline"

[[importance]]
name = "RECOMMENDATION"
description = "This is a recomendation. You might have to argue way this check does not apply to a specific project."
cure_period_in_days = 180
icon = "material-alert-circle-outline"

[[importance]]
name = "LEGACY"
description = "This validation does not loger apply."
cure_period_in_days = -1
icon = "material-archive-alert-outline"

[[categories]]
name = "SUBMISSION"
description = "Validations done one time when a project is submitted."

[[categories]]
name = "METADATA"
description = "There is an issue about the member metadata used in the ecosystem. It is not an upstream error."

[[categories]]
name = "GENERAL"
description = """General criteria that might be implemented differently, depending on the project. Check the "related to" validations to see which might apply to a specific repository, software, or package."""

[[categories]]
name = "ACTIVITY"
description = "The project might not have a level of activity to be considered well-maintained."

[[categories]]
name = "OSS"
description = "There is an issue with some of the open-source aspect of the project."

[[categories]]
name = "OUT-OF-DATE"
description = "The project might not follow the last best-practices or connects to Qiskit in a way that is considered old-fashioned, currently unsupported, or deprecated."

[[categories]]
name = "BEST-PRACTICE"
description = "The project might not follow software general best-practices."
